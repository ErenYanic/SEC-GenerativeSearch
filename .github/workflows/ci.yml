name: CI

# Continuous integration gates for SEC-GenerativeSearch.
#
# Design principles:
#   - Parallel jobs (lint + test) so failures are surfaced independently.
#   - No GCP credentials here — deployment lives in a separate workflow.
#   - Actions pinned by full commit SHA (supply-chain hardening).
#   - No ``${{ github.event.* }}`` interpolation inside ``run:`` blocks
#     (command-injection prevention).  Data-dependent paths use env vars.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel stale runs on new pushes to the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default permissions: least privilege.  Jobs opt in to more as needed.
permissions:
  contents: read

jobs:
  lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  test:
    name: Pytest
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install core + test dependencies
        # Intentionally exclude ``[encryption]`` — pysqlcipher3 requires a
        # system library that is slow to install on CI and is covered by
        # a dedicated integration workflow.
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run tests with coverage
        run: pytest --cov=sec_generative_search --cov-report=term-missing

  dependency-scan:
    # Scan installed dependencies for known CVEs.
    # ``pip-audit`` queries the PyPI advisory database.  Failures are
    # treated as hard-fail: a new CVE on a pinned transitive is the
    # signal to bump or pin around, not to merge through.
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Snapshot resolved project dependencies
        # Audit the resolved project dependency set, not the Python
        # bootstrap tooling that happens to exist in the runner image.
        # ``pip`` / ``setuptools`` / ``wheel`` are installer components,
        # not application dependencies, and upstream advisories against
        # them should not fail unrelated PRs while no fixed release exists.
        run: |
          python -m pip freeze --exclude-editable > audit-requirements.txt
          python - <<'PY'
          from pathlib import Path

          bootstrap_packages = ("pip==", "setuptools==", "wheel==")
          requirements_path = Path("audit-requirements.txt")
          filtered_lines = [
              line
              for line in requirements_path.read_text(encoding="utf-8").splitlines()
              if line and not line.lower().startswith(bootstrap_packages)
          ]
          requirements_path.write_text(
              "\n".join(filtered_lines) + "\n",
              encoding="utf-8",
          )
          PY
          python -m pip install "pip-audit>=2.7"

      - name: Audit installed dependencies for known vulnerabilities
        # The snapshot is taken before installing ``pip-audit`` itself, so
        # the audit surface stays limited to the project's resolved runtime
        # and test dependencies. Any genuine advisory in that set still
        # fails the job.
        run: python -m pip_audit -r audit-requirements.txt

  secret-scan:
    # Scan the working tree for accidentally-committed
    # credentials.  Uses ``detect-secrets`` (pure Python, installed from
    # PyPI) so no third-party GitHub Action SHA has to be pinned here;
    # the supply-chain surface is the same as the other Python steps.
    #
    # Trade-off: ``detect-secrets`` scans the working tree, not the
    # full commit history.  For the current repo size that is
    # acceptable.  A SHA-pinned ``gitleaks`` action can be swapped in
    # later if deep-history scanning becomes necessary.
    name: detect-secrets
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install detect-secrets
        run: |
          python -m pip install --upgrade pip
          python -m pip install "detect-secrets>=1.5"

      - name: Scan for secrets
        # ``detect-secrets-hook`` compares every tracked file against
        # ``.secrets.baseline`` — a committed audit trail of known
        # false-positives (docstring examples, ``.env.example``
        # placeholders, and deterministic test fixtures).  Any finding
        # that is NOT already in the baseline fails the job.  New real
        # secrets therefore block the PR, while refactoring a known
        # false-positive does not generate noise.
        #
        # To update the baseline after adding a new deliberate fixture:
        #   detect-secrets scan \
        #     --exclude-files 'uv\.lock' \
        #     --exclude-files '\.venv/' \
        #     --exclude-files 'node_modules/' \
        #     --exclude-files 'frontend/pnpm-lock\.yaml' \
        #     > .secrets.baseline
        run: |
          git ls-files -- \
            ':!uv.lock' ':!.venv/**' ':!node_modules/**' \
            ':!frontend/pnpm-lock.yaml' \
            | xargs detect-secrets-hook --baseline .secrets.baseline

  frontend:
    # Frontend CI gate. Runs lint (XSS-hygiene rules), tsc, the Vitest
    # security regression suite, the production build, and ``pnpm audit``
    # against high / critical CVEs. A failure on any of these blocks the
    # PR. The job lives in the same workflow as the backend gates so a
    # single CI report reflects the whole tree.
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: "22"

      - name: Enable Corepack and activate pinned pnpm
        # Corepack on actions/setup-node 4.x ships a version where
        # ``corepack prepare --activate`` without a positional arg fails
        # to auto-detect the ``packageManager`` field, even when the
        # current directory matches ``working-directory``. Pass the pinned
        # spec explicitly. Keep this version in lockstep with
        # ``packageManager`` in ``frontend/package.json``.
        run: |
          corepack enable
          corepack prepare pnpm@11.2.2 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm typecheck

      - name: Run Vitest security regression suite
        run: pnpm test

      - name: Production build (asserts no CSP carve-outs leak)
        run: pnpm build

      - name: Audit dependencies (high / critical CVEs)
        # ``--prod`` scopes the audit to runtime dependencies so a
        # build-only devDependency CVE does not block a PR; runtime
        # CVEs reach the browser and are non-negotiable.
        run: pnpm audit:ci
