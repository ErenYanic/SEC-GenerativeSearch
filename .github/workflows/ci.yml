name: CI

# Continuous integration gates for SEC-GenerativeSearch.
#
# Design principles (per TODO.md Phase 15.7, 15.8, 16.9):
#   - Parallel jobs (lint + test) so failures are surfaced independently.
#   - No GCP credentials here — deployment lives in a separate workflow.
#   - Actions pinned by full commit SHA (supply-chain hardening).
#   - No ``${{ github.event.* }}`` interpolation inside ``run:`` blocks
#     (command-injection prevention).  Data-dependent paths use env vars.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel stale runs on new pushes to the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default permissions: least privilege.  Jobs opt in to more as needed.
permissions:
  contents: read

jobs:
  lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  test:
    name: Pytest
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install core + test dependencies
        # Intentionally exclude ``[encryption]`` — pysqlcipher3 requires a
        # system library that is slow to install on CI and is covered by
        # a dedicated integration workflow in later phases.
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run tests with coverage
        run: pytest --cov=sec_generative_search --cov-report=term-missing

  dependency-scan:
    # Phase 3.10 — scan installed dependencies for known CVEs.
    # ``pip-audit`` queries the PyPI advisory database.  Failures are
    # treated as hard-fail: a new CVE on a pinned transitive is the
    # signal to bump or pin around, not to merge through.
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
          python -m pip install "pip-audit>=2.7"

      - name: Audit installed dependencies for known vulnerabilities
        # ``--strict`` makes unknown/unsupported packages a failure
        # rather than a silent pass.
        run: python -m pip_audit --strict

  secret-scan:
    # Phase 3.10 — scan the working tree for accidentally-committed
    # credentials.  Uses ``detect-secrets`` (pure Python, installed from
    # PyPI) so no third-party GitHub Action SHA has to be pinned here;
    # the supply-chain surface is the same as the other Python steps.
    #
    # Trade-off: ``detect-secrets`` scans the working tree, not the
    # full commit history.  For the current repo size that is
    # acceptable.  A SHA-pinned ``gitleaks`` action can be swapped in
    # later if deep-history scanning becomes necessary.
    name: detect-secrets
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install detect-secrets
        run: |
          python -m pip install --upgrade pip
          python -m pip install "detect-secrets>=1.5"

      - name: Scan for secrets
        # ``--exclude-files`` drops vendored lockfile and build
        # artefacts that routinely trigger entropy false-positives.
        # Any finding fails the job — there is no allow-list.
        run: |
          detect-secrets scan \
            --exclude-files 'uv\.lock' \
            --exclude-files '\.venv/' \
            --exclude-files 'node_modules/' \
            > secrets-report.json
          python -c 'import json,sys; r=json.load(open("secrets-report.json")); f=r.get("results",{}); print(json.dumps(f,indent=2)) if f else print("detect-secrets: no findings"); sys.exit(1 if f else 0)'
