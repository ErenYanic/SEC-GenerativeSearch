# ===========================================================================
# SEC-GenerativeSearch — portable self-hosted stack
# ===========================================================================
# Three services, one private network, one durable volume:
#
#   nginx (edge, :80/:443)  --/api/, /ws/-->  api       (FastAPI, internal :8000)
#                           --/, /api/admin/->  frontend (Next.js, internal :3000)
#
# Platform-neutral — no GCP / cloud dependency. Scenario A (local) can skip
# nginx entirely and use a lighter .env.
#
# Security posture (enforced by deployment-artifact tests):
#   - NO secret is baked or written as a literal here — every secret arrives at
#     runtime via `.env` (env_file) or a mounted *_FILE secret under ./secrets.
#   - The api service runs a SINGLE replica: the in-process TaskManager mints
#     task IDs in-process, so a second replica orphans them.
#   - Only nginx publishes host ports; api + frontend stay on the internal
#     network (the browser reaches the backend only through the Next proxy).
#   - nginx terminates TLS and owns NO CSP — the Next middleware does.
#
# Bring up:   docker compose -f deploy/docker-compose.yml up -d --build
# Tear down:  docker compose -f deploy/docker-compose.yml down
# Logs:       docker compose -f deploy/docker-compose.yml logs -f api
#
# Prerequisites (operator-supplied, never committed):
#   - deploy/.env                      (Scenario B/C operator config)
#   - deploy/secrets/db_encryption_key (DB_ENCRYPTION_KEY_FILE target)
#   - deploy/secrets/api_auth_pepper   (API_AUTH_PEPPER_FILE target)
#   - deploy/certs/fullchain.pem + privkey.pem  (TLS cert + key)

name: sec-generative-search

services:
  # -----------------------------------------------------------------------
  # FastAPI backend — single in-process-TaskManager replica.
  # -----------------------------------------------------------------------
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    image: sec-gs-api:local
    restart: unless-stopped
    # Exactly one replica — the in-process TaskManager mints task IDs in-process.
    deploy:
      replicas: 1
    # Non-secret config arrives at runtime via .env; nothing is baked. The file
    # is optional so Scenario A (no auth) can run without one.
    env_file:
      - path: .env
        required: false
    environment:
      # Point the secret-bearing knobs at the Docker-secret mount points below.
      DB_ENCRYPTION_KEY_FILE: /run/secrets/db_encryption_key
      API_AUTH_PEPPER_FILE: /run/secrets/api_auth_pepper
    # Docker secrets mount read-only at /run/secrets/<name> and fail loudly if
    # the source file is missing (a plain bind mount would silently create a
    # directory there and break SQLCipher).
    secrets:
      - db_encryption_key
      - api_auth_pepper
    volumes:
      # Durable Tier-2/3 state: SQLite/SQLCipher + ChromaDB + the HF model cache.
      # task_history is the only crash-durable ingest record — keep it durable.
      - sec_gs_data:/app/data
    expose:
      - "8000"
    networks:
      - sec_gs
    # The image HEALTHCHECK probes /api/health; compose surfaces it as `healthy`.

  # -----------------------------------------------------------------------
  # Next.js SPA — stateless, keyless. Reaches the API server-side only.
  # -----------------------------------------------------------------------
  frontend:
    build:
      context: ../frontend
      dockerfile: ../deploy/Dockerfile.frontend
    image: sec-gs-frontend:local
    restart: unless-stopped
    environment:
      # Server-side base URL the Next admin proxy forwards to. NEVER NEXT_PUBLIC_*
      # (that would reach the browser).
      SEC_API_BASE_URL: http://api:8000
    expose:
      - "3000"
    depends_on:
      - api
    networks:
      - sec_gs

  # -----------------------------------------------------------------------
  # nginx edge — TLS termination + routing only. Owns NO CSP.
  # -----------------------------------------------------------------------
  nginx:
    # Digest-pinned (supply-chain hardening), bookworm/glibc family.
    # Re-pin the multi-platform INDEX digest:
    #   docker buildx imagetools inspect nginx:1.27-bookworm --format '{{.Manifest.Digest}}'
    image: nginx:1.27-bookworm@sha256:6784fb0834aa7dbbe12e3d7471e69c290df3e6ba810dc38b34ae33d3c1c05f7d
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # TLS material — operator-supplied, never committed.
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - api
      - frontend
    networks:
      - sec_gs

networks:
  sec_gs:
    driver: bridge

volumes:
  sec_gs_data:
    driver: local

# Operator-supplied secret files — never committed (deploy/secrets/ is
# git-ignored). Create them before `up`:
#   printf '%s' "<32+ byte random>" > deploy/secrets/db_encryption_key
#   printf '%s' "<32+ byte random>" > deploy/secrets/api_auth_pepper
secrets:
  db_encryption_key:
    file: ./secrets/db_encryption_key
  api_auth_pepper:
    file: ./secrets/api_auth_pepper
