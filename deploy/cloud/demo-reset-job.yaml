# ===========================================================================
# SEC-GenerativeSearch — demo-reset Cloud Run Job (Scenario C, cloud)
# ===========================================================================
# A Cloud Run *Job* (not a Service) that wipes the ingested filing corpus on a
# schedule, returning a public demo to a clean state. It is the sanctioned
# reset path PRECISELY because the API blocks `clear` under API_DEMO_MODE
# (`DELETE /api/filings/?confirm=true` → 403 demo_mode), while the operator-only
# CLI deliberately does NOT honour demo mode — so `sec-rag manage clear` is the
# one surface that can reset a demo. (See AGENT.md §CLI: "CLI does NOT honour
# API_DEMO_MODE".)
#
# Apply, then schedule:
#   gcloud run jobs replace deploy/cloud/demo-reset-job.yaml --region REGION
#   # Cloud Scheduler invokes the Jobs Admin API on a cron (operator-supplied):
#   gcloud scheduler jobs create http sec-gs-demo-reset-trigger \
#     --schedule="0 3 * * *" --time-zone="Etc/UTC" --http-method=POST \
#     --uri="https://REGION-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/PROJECT_ID/jobs/sec-gs-demo-reset:run" \
#     --oauth-service-account-email="sec-gs-scheduler-sa@PROJECT_ID.iam.gserviceaccount.com"
#
# Security / correctness posture (statically enforced by tests/ops/
# test_deployment_artifacts.py — the GCP half of the Phase 15.11 lockers):
#   - It is a Job (runs to completion per trigger), never a long-lived Service.
#   - NO BAKED SECRET. The SQLCipher key arrives from Secret Manager via
#     `valueFrom.secretKeyRef`; the cleartext is never in the manifest or image.
#   - It runs the CLI via `args` only (the image ENTRYPOINT — the gosu drop —
#     stays in force), so the reset still runs as the unprivileged `appuser`.
#   - It shares the same GCS FUSE data bucket as the API service, so the cleared
#     state is the same store the API serves from.
# ---------------------------------------------------------------------------
apiVersion: run.googleapis.com/v1
kind: Job
metadata:
  name: sec-gs-demo-reset
  labels:
    app: sec-generative-search
    component: demo-reset
spec:
  template:        # ExecutionTemplate
    spec:
      # One task, no parallelism; one retry then give up (a failed reset must
      # not loop and hammer the store).
      taskCount: 1
      parallelism: 1
      template:    # TaskTemplate
        spec:
          maxRetries: 1
          timeoutSeconds: 600
          # Secret Manager accessor + the data bucket — same identity the API
          # uses, so it can open the SQLCipher store the API writes.
          serviceAccountName: sec-gs-api-sa@PROJECT_ID.iam.gserviceaccount.com
          containers:
            - name: demo-reset
              # The SAME API image — it carries the `sec-rag` CLI entry point.
              image: REGION-docker.pkg.dev/PROJECT_ID/sec-gs/api:latest
              # `args` only (no `command`): the image ENTRYPOINT
              # (docker-entrypoint.sh) still runs, chowns the volume, and execs
              # `gosu appuser sec-rag manage clear -y` — the reset runs non-root.
              args:
                - sec-rag
                - manage
                - clear
                - "-y"
              resources:
                limits:
                  cpu: "1"
                  memory: 2Gi
              env:
                - name: DB_DEPLOYMENT_PROFILE
                  value: cloud
                # `manage clear` resolves the collection stamp from the embedder
                # registry (dimension only — no model load, no GPU needed here).
                - name: EMBEDDING_PROVIDER
                  value: local
                # Secret-bearing knob: Secret Manager only, never inline. The
                # SQLCipher key is needed to open the encrypted metadata store.
                - name: DB_ENCRYPTION_KEY
                  valueFrom:
                    secretKeyRef:
                      name: sec-gs-db-encryption-key
                      key: latest
              volumeMounts:
                - name: data
                  mountPath: /app/data
          volumes:
            # Same durable bucket as the API service — the reset clears the very
            # store the API reads.
            - name: data
              csi:
                driver: gcsfuse.run.googleapis.com
                volumeAttributes:
                  bucketName: sec-gs-data-PROJECT_ID
