# ===========================================================================
# SEC-GenerativeSearch — nginx reverse proxy
# ===========================================================================
# Single edge for the two-service topology: the Next.js SPA (frontend:3000)
# and the FastAPI backend (api:8000). nginx does ROUTING + TLS TERMINATION
# ONLY.
#
#   *** nginx sets NO Content-Security-Policy and NO security headers. ***
#
# The full CSP (per-request Web Crypto nonce) + the static security-header set
# are owned by the Next.js middleware. Injecting a second CSP here would either
# fight the nonce'd policy or silently weaken it.
#
# Routing model (longest-prefix-wins is load-bearing):
#   /api/admin/  -> frontend   The browser reaches the backend ONLY through the
#                              Next admin proxy at /api/admin/*. That route lives
#                              on the Next server, which injects the server-held
#                              operator/admin keys. It MUST win over /api/ below.
#   /ws/         -> api        WebSocket upgrade (ingest progress for non-browser
#                              clients). CORS does not protect WS upgrades — the
#                              backend's own Origin allow-list (API_CORS_ORIGINS)
#                              is the authorisation surface; nginx forwards Origin.
#   /api/        -> api        Direct API / integration / Prometheus scrape of
#                              /api/metrics. Backend auth (X-API-Key/X-Admin-Key)
#                              still gates every route; the browser never uses it.
#   /            -> frontend   SPA pages + /_next/* static assets.
#
# TLS is required for Scenarios B/C (the session + admin_session cookies are
# Secure-only and will not round-trip over plain HTTP). Drop a certificate +
# key into the mounted ./deploy/certs directory (see docker-compose.yml).

upstream api {
    server api:8000;
}

upstream frontend {
    server frontend:3000;
}

# Translate the inbound Upgrade header into the hop-by-hop Connection token a
# WebSocket / SSE upstream expects. Empty Connection for ordinary requests so
# keep-alive is not forced.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      '';
}

# --------------------------------------------------------------------------
# HTTP :80 — redirect everything to HTTPS (no app traffic served in clear).
# --------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # ACME http-01 challenge (certbot webroot), if used, lands here before the
    # redirect. Comment back in when wiring Let's Encrypt.
    # location /.well-known/acme-challenge/ { root /var/www/certbot; }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --------------------------------------------------------------------------
# HTTPS :443 — the application edge.
# --------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    # --- TLS ---------------------------------------------------------------
    # Mount a real certificate + key at these paths (see docker-compose.yml).
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Body-size guard. The backend's ContentSizeLimitMiddleware enforces the
    # authoritative per-route caps (global ceiling 1 MiB); this is a coarse
    # outer bound so a giant body is dropped at the edge, not in the app.
    client_max_body_size 2m;

    # NOTE: deliberately NO add_header Content-Security-Policy / Strict-Transport-Security
    # / X-Frame-Options / Referrer-Policy / Permissions-Policy here. The Next.js
    # middleware is the single source of truth for the full header set.

    # --- /api/admin/ -> frontend (Next admin proxy; MUST precede /api/) -----
    # Longer prefix wins, so the browser's key-injecting proxy keeps working.
    # Streaming-friendly: the RAG SSE answer flows browser -> Next -> backend,
    # and this hop must not buffer it.
    location /api/admin/ {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # SSE / long generations: do not buffer, allow a long idle read.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # --- /ws/ -> api (WebSocket upgrade) -----------------------------------
    location /ws/ {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Origin is the backend's WS authorisation surface — forward it intact.
        proxy_set_header Origin $http_origin;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # --- /api/ -> api (direct API consumers / Prometheus) ------------------
    location /api/ {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Ingest kicks off a background task and returns fast, but allow a
        # generous read window for slow upstreams / large request bodies.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # --- /_next/static/ -> frontend (immutable build assets) ---------------
    location /_next/static/ {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Hashed filenames — safe to cache hard at the edge / in the browser.
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # --- / -> frontend (SPA pages) -----------------------------------------
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
